      border-radius: 5px;

      z-index: 100;

      top: 5px;
      left: 5px;
      background-color: rgba(0, 30, 50, 0.7);
      border: 1px solid #00ffff;
      border-radius: 5px;
      padding: 5px;
      display: flex;

      z-index: 5;

    .data-card {

      flex-direction: column;
      align-items: center;
      padding: 1px;
      margin-bottom: 1px;
    }

    .data-card img {
      width: 50px;
      height: 50px;
    }

    .status-pie {

      bottom: 20px;
      right: 20px;
      width: 200px;
      height: 200px;
      z-index: 20;

            value: [wellData[key].经度, wellData[key].纬度, wellData[key].折算系数],
            symbolSize: 1
          }));

          let customTooltip = null;
          mapChart.on('mousemove', function(params) {
            if (params.seriesType === 'scatter' && params.name) {
              const info = wellData[params.name];
              const content = `
               <div>
                  <h3 style="color:#00ffff; margin: 0 0 10px 0;">${info.编号}</h3>
                  <p><strong>灌溉方式：</strong> ${info.灌溉方式}</p>
                  <p><strong>地下水埋深：</strong> ${info.地下水埋深.toFixed(2)} m</p>
                  <p><strong>降深：</strong> ${info.降深.toFixed(2)} m</p>
                  <p><strong>最终地下水埋深：</strong> ${info.最终地下水埋深.toFixed(2)} m</p>
                  <p><strong>井龄：</strong> ${info.井龄}</p>
                  <p><strong>水泵功率：</strong> ${info.功率} kW</p>
                  <p><strong>扬程：</strong> ${info.扬程} m</p>
                  <p><strong>流量：</strong> ${info.流量} m³/h</p>
                  <p><strong>折算系数：</strong> ${info.折算系数.toFixed(2)}</p>
                </div>
              `;

              if (!customTooltip) {
                customTooltip = document.createElement('div');
                customTooltip.className = 'custom-tooltip';
                document.body.appendChild(customTooltip);
              }

              customTooltip.innerHTML = content;
              customTooltip.style.left = (params.event.offsetX + 10) + 'px';
              customTooltip.style.top = (params.event.offsetY + 10) + 'px';
              customTooltip.style.display = 'block';
            }
          });

          mapChart.on('mouseout', function() {
            if (customTooltip) {
              customTooltip.style.display = 'none';
            }
          });

          mapChart.setOption({
            series: [
              {
                name: '监测井',
                data: scatterData
              },
              {
                name: '折算系数等值线',
                type: 'heatmap',
                coordinateSystem: 'geo',
                data: conversionFactorData.map(item => [item.value[0], item.value[1], item.value[2]]),
                min: 1,
                max: 20,
                label: {
                  show: true
                },
                itemStyle: {
                  color: '#00ffff'
                }
              }
            ]
          });

          barChart = echarts.init(document.getElementById('barChart'));
          const option = {
            tooltip: { trigger: 'axis' },
            legend: {
              data: ['总水量 (m³)', '总电量 (kWh)'],
              textStyle: { color: '#fff' }
            },
            xAxis: {
              type: 'category',
              data: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
              axisLabel: { color: '#fff' }
            },
            yAxis: [
              {
                type: 'value',
                name: '水量 (m³)',
                position: 'left',
                axisLine: { lineStyle: { color: '#00ffff' } },
                splitLine: { show: false }
              },
              {
                type: 'value',
                name: '电量 (kWh)',
                position: 'right',
                axisLine: { lineStyle: { color: '#ffcc00' } },
                splitLine: { show: false }
              }
            ],
            series: [
              {
                name: '总水量 (m³)',
                type: 'bar',
                data: [150, 160, 180, 170, 190, 210, 220, 200, 195, 185, 170, 165],
                itemStyle: { color: '#00ffff' }
              },
              {
                name: '总电量 (kWh)',
                type: 'bar',
                data: [320, 280, 340, 300, 390, 420, 450, 410, 370, 360, 330, 310],
                itemStyle: { color: '#ffcc00' }
              }
            ]
          };
          barChart.setOption(option);

          statusPieChart = echarts.init(document.getElementById('statusPie'));
          const statusData = Object.values(wellData).reduce((acc, well) => {
            acc[well.状态] = (acc[well.状态] || 0) + 1;
            return acc;
          }, {});

          const statusOption = {
  tooltip: {
    trigger: 'item'
  },
  legend: {
    orient: 'vertical',
    left: 'left', // 将图例位置调整为左侧
    top: 'top',   // 将图例位置调整为顶部
    data: ['正常', '维修中', '待检修'],
    textStyle: { color: '#fff' }
  },
  series: [
    {
      name: '观测井状态',
      type: 'pie',
      radius: ['20%', '40%'], // 调整内外半径
      center: ['60%', '50%'], // 调整饼图中心位置
      avoidLabelOverlap: false,
      itemStyle: {
        borderRadius: 4,
        borderColor: '#fff',
        borderWidth: 1
      },
      label: {
        show: false // 隐藏数据标签
      },
      emphasis: {
        itemStyle: {
          shadowBlur: 10,
          shadowOffsetX: 0,
          shadowColor: 'rgba(0, 0, 0, 0.5)'
        }
      },
      data: [
        { value: statusData['正常'] || 0, name: '正常' },
        { value: statusData['维修中'] || 0, name: '维修中' },
        { value: statusData['待检修'] || 0, name: '待检修' }
      ]
    }
  ]

};
          statusPieChart.setOption(statusOption);

          window.addEventListener('resize', function() {
            mapChart.resize();
            barChart.resize();
            statusPieChart.resize();
          });
        });
    });
  </script>
</body>
</html>
